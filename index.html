<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ড্যাশবোর্ড - BD BIG BAZZAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50">

    <!-- লগইন ওভারলে -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
            <h2 class="text-xl font-bold mb-4">অ্যাডমিন লগইন</h2>
            <input type="email" id="email" placeholder="ইমেইল" class="w-full p-3 border rounded-xl mb-3">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl">লগইন</button>
        </div>
    </div>

    <!-- ন্যাভবার -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center px-8">
        <h1 class="text-xl font-bold text-blue-600">BD BIG BAZZAR | অ্যাডমিন</h1>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">লগআউট</button>
    </nav>

    <!-- মেইন কন্টেন্ট -->
    <main class="p-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-blue-600 p-6 rounded-2xl text-white shadow-lg">
                <p class="opacity-80">মোট অর্ডার</p>
                <h3 id="total-orders" class="text-3xl font-bold">0</h3>
            </div>
            <div class="bg-green-600 p-6 rounded-2xl text-white shadow-lg">
                <p class="opacity-80">মোট আয় (সম্পন্ন)</p>
                <h3 id="total-revenue" class="text-3xl font-bold">৳0</h3>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
                    <tr>
                        <th class="p-4">ক্রেতার নাম / ইমেইল</th>
                        <th class="p-4">পণ্য</th>
                        <th class="p-4">স্ট্যাটাস</th>
                        <th class="p-4">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="order-table-body" class="divide-y divide-gray-100">
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // ফায়ারবেস কনফিগারেশন সেটিংস
        const firebaseConfig = {
          apiKey: "AIzaSyDkGXgmvdIAoN2-RmyAKWNLhWYbxn1o6tc",
          authDomain: "bd-big-bazzar.firebaseapp.com",
          databaseURL: "https://bd-big-bazzar-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "bd-big-bazzar",
          storageBucket: "bd-big-bazzar.firebasestorage.app",
          messagingSenderId: "142465208059",
          appId: "1:142465208059:web:59123d10a9dbf9f87e2a5e",
          measurementId: "G-TC87H0RJ7D"
        };

        // ফায়ারবেস প্রজেক্ট চালু করা
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // লগইন স্ট্যাটাস রিয়েল-টাইম চেক
        auth.onAuthStateChanged((user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadOrders();
        });

        // অ্যাডমিন সাইন-ইন ফাংশন
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password).catch(err => alert("লগইন ব্যর্থ: " + err.message));
        }

        // সাইন-আউট ফাংশন
        function logout() { 
            auth.signOut().then(() => location.reload()); 
        }

        // ফায়ারস্টোর থেকে রিয়েল-টাইমে অর্ডার লোড ও টাইমস্ট্যাম্প অনুযায়ী সর্টিং
        function loadOrders() {
            // 'timestamp' ফিল্ড ব্যবহার করে নতুন অর্ডার সবার ওপরে ('desc') সাজানো হয়েছে
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const tableBody = document.getElementById('order-table-body');
                tableBody.innerHTML = '';
                let totalRevenue = 0;

                snapshot.forEach((doc) => {
                    const order = doc.data();
                    
                    // রাজস্ব বা মোট আয় হিসাব (শুধুমাত্র সম্পন্ন হওয়া অর্ডারের জন্য)
                    if(order.status === 'completed') {
                        totalRevenue += parseFloat(order.amount || order.price || 0);
                    }

                    // অর্ডারের ডেটা টেবিলে ডাইনামিকালি পুশ করা
                    tableBody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="p-4 font-medium text-gray-800">${order.name || order.email || 'অজানা ক্রেতা'}</td>
                            <td class="p-4 text-sm text-gray-600">${order.products || order.product || 'Premium T-Shirt'}</td>
                            <td class="p-4">
                                <select onchange="updateStatus('${doc.id}', this.value)" class="border rounded-lg p-1 text-sm bg-white shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>পেন্ডিং</option>
                                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>সম্পন্ন</option>
                                </select>
                            </td>
                            <td class="p-4">
                                <button onclick="deleteOrder('${doc.id}')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-xs transition-colors shadow-sm">মুছুন</button>
                            </td>
                        </tr>`;
                });
                
                // ড্যাশবোর্ড কাউন্টার আপডেট
                document.getElementById('total-orders').innerText = snapshot.size;
                document.getElementById('total-revenue').innerText = '৳' + totalRevenue.toLocaleString();
            }, (error) => {
                console.error("ফায়ারস্টোর ডেটা লোড এরর: ", error);
            });
        }

        // অর্ডার ডেলিভারি স্ট্যাটাস আপডেট ফাংশন
        function updateStatus(id, status) {
            db.collection("orders").doc(id).update({ status: status })
            .catch(err => alert("স্ট্যাটাস আপডেট ব্যর্থ: " + err.message));
        }

        // অর্ডার পার্মানেন্টলি ডিলিট ফাংশন
        function deleteOrder(id) {
            if(confirm("আপনি কি নিশ্চিতভাবে এই অর্ডারটি ডাটাবেজ থেকে মুছে ফেলতে চান?")) {
                db.collection("orders").doc(id).delete()
                .catch(err => alert("মুছে ফেলা সম্ভব হয়নি: " + err.message));
            }
        }
    </script>
</body>
</html>
